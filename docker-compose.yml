version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: soc-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Elasticsearch (backend for Security Onion & Wazuh)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION}
    container_name: soc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS}"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - soc-network
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Kibana (Visualization)
  kibana:
    image: docker.elastic.co/kibana/kibana:${KIBANA_VERSION}
    container_name: soc-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
    ports:
      - "${KIBANA_PORT}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-network
    healthcheck:
      test: curl -s http://localhost:5601 >/dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Wazuh Manager
  wazuh-manager:
    image: wazuh/wazuh:${WAZUH_VERSION}
    container_name: soc-wazuh-manager
    environment:
      - INDEXER_URL=https://elasticsearch:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${ELASTIC_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/certs/ca.crt
      - SSL_CERTIFICATE=/etc/ssl/certs/server.crt
      - SSL_KEY=/etc/ssl/private/server.key
    ports:
      - "${WAZUH_MANAGER_PORT}:1514"
      - "${WAZUH_API_PORT}:55000"
    volumes:
      - wazuh_api_data:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:55000/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # Wazuh Dashboard
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION}
    container_name: soc-wazuh-dashboard
    environment:
      - INDEXER_URL=https://elasticsearch:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${ELASTIC_PASSWORD}
      - WAZUH_API_URL=https://wazuh-manager:55000
      - WAZUH_API_USERNAME=${WAZUH_MANAGER_ADMIN_USER}
      - WAZUH_API_PASSWORD=${WAZUH_MANAGER_ADMIN_PASSWORD}
    ports:
      - "${WAZUH_DASHBOARD_PORT}:443"
    depends_on:
      - elasticsearch
      - wazuh-manager
    networks:
      - soc-network
    restart: unless-stopped

  # API Service (Custom)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: soc-api
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:${DATABASE_PORT}/${DATABASE_NAME}
      - API_PORT=${API_PORT}
      - DEBUG=${DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
    networks:
      - soc-network
    restart: unless-stopped

  # Compliance Engine
  compliance:
    build:
      context: ./compliance
      dockerfile: Dockerfile
    container_name: soc-compliance
    environment:
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:${DATABASE_PORT}/${DATABASE_NAME}
      - COMPLIANCE_FRAMEWORK=${COMPLIANCE_FRAMEWORK}
      - AUDIT_LOGGING_ENABLED=${AUDIT_LOGGING_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./compliance:/app
      - compliance_reports:/reports
    networks:
      - soc-network
    restart: unless-stopped

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - soc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  elasticsearch_data:
  wazuh_api_data:
  wazuh_etc:
  wazuh_logs:
  redis_data:
  compliance_reports:

networks:
  soc-network:
    driver: bridge